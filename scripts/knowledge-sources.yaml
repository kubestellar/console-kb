# Knowledge Sources Configuration
# Controls which sources the CNCF mission generator searches.
# Each source can be individually enabled/disabled with quality thresholds.

sources:
  github-issues:
    enabled: true
    description: "Closed GitHub issues with linked PRs (high engagement)"
    minReactions: 10
    minComments: 10
    maxPerProject: 20
    searchWindow: "90d"
    rateLimitDelay: 200

  github-discussions:
    enabled: true
    description: "Answered GitHub Discussions (Q&A format)"
    minUpvotes: 5
    maxPerProject: 10
    searchWindow: "90d"
    rateLimitDelay: 200

  reddit:
    enabled: true
    description: "Reddit posts from kubernetes/cloud-native subreddits"
    subreddits:
      - kubernetes
      - devops
      - k8s
      - cloudnative
    minUpvotes: 20
    maxPerProject: 10
    searchWindow: "180d"
    rateLimitDelay: 2000  # Reddit rate limits are strict

  stackoverflow:
    enabled: true
    description: "Stack Overflow Q&A with accepted answers"
    minVotes: 10
    maxPerProject: 10
    searchWindow: "365d"
    rateLimitDelay: 1000  # 300 req/day without key

  cncf-blog:
    enabled: false  # Future: CNCF blog post analysis
    description: "CNCF blog posts and case studies"
    maxPerProject: 5
    searchWindow: "365d"
